name: Build And Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - build_static_html.py
      - assign_bike_escorts.py
      - requirements.txt
      - data/final.csv
      - data/bike_escorts.json
      - data/bike_escorts.sample.json
      - .github/workflows/pages.yml
      - docs/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Optional bike escort post-gen
        run: |
          if [ -f data/bike_escorts.json ]; then
            python assign_bike_escorts.py \
              --final-csv data/final.csv \
              --config data/bike_escorts.json \
              --output data/final.csv
          else
            echo "No data/bike_escorts.json found, skipping bike escort post-gen."
          fi

      - name: Build static HTML from final.csv
        run: |
          python build_static_html.py \
            --final-csv data/final.csv \
            --output docs/index.html \
            --title "UB26 Futóbeosztás" \
            --team-name "Csiga Csillagok" \
            --race-date "2026-04-25"

      - name: Disable Jekyll
        run: touch docs/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
